<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong</title>
<style>
body{margin:0;background:#111;font-family:Arial;overflow:hidden;}

#startScreen{
  position:absolute;inset:0;background:#111;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;color:white;z-index:10;
}
.inputRow{display:flex;flex-direction:column;font-size:20px;}
input{padding:8px;border-radius:6px;border:none;font-size:20px;margin-top:5px;}
select{padding:8px;border-radius:6px;border:none;font-size:20px;margin-top:5px;}

button{
  padding:12px 25px;border:none;background:#4ade80;
  color:black;border-radius:8px;font-size:20px;cursor:pointer;font-weight:bold;
}
button:hover{filter:brightness(1.15);}

.colorRow{display:flex;gap:10px;}
.colorBox{
  width:35px;height:35px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:border-color .2s;
}
.colorBox.selected,.colorBox:hover{border-color:white;}

canvas{position:absolute;inset:0;background:black;}

/* ── Win overlay ── */
#winOverlay{
  display:none;
  position:absolute;inset:0;
  background:rgba(0,0,0,0.75);
  align-items:center;justify-content:center;
  flex-direction:column;gap:24px;
  color:white;z-index:20;
  font-family:Arial;
}
#winOverlay.show{display:flex;}
#winMsg{font-size:48px;font-weight:bold;text-shadow:0 0 20px currentColor;}
#winSub{font-size:24px;opacity:.8;}
#winBtn{
  padding:14px 32px;border:none;border-radius:10px;
  font-size:22px;font-weight:bold;cursor:pointer;background:#4ade80;color:#111;
}
#winBtn:hover{filter:brightness(1.15);}
</style>
</head>
<body>

<!-- ── Start screen ── -->
<div id="startScreen">
  <div style="font-size:36px;font-weight:bold;letter-spacing:2px;margin-bottom:8px;">🏓 PONG</div>

  <div class="inputRow">
    <label>Spelare 1 (vänster):</label>
    <input id="p1name" placeholder="Namn..." maxlength="18">
  </div>
  <div class="inputRow">
    <label>Spelare 2 (höger):</label>
    <input id="p2name" placeholder="Namn..." maxlength="18">
  </div>

  <div class="inputRow">
    <label>Poäng för vinst:</label>
    <select id="winScore">
      <option value="3">3 poäng</option>
      <option value="5" selected>5 poäng</option>
      <option value="7">7 poäng</option>
      <option value="10">10 poäng</option>
    </select>
  </div>

  <div class="inputRow">
    <label>Svårighet:</label>
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium" selected>Intermediate</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="inputRow">
    <label>Välj färgtema:</label>
    <div class="colorRow" id="colorRow">
      <div class="colorBox selected" style="background:#4ade80" data-color="#4ade80"></div>
      <div class="colorBox" style="background:#60a5fa" data-color="#60a5fa"></div>
      <div class="colorBox" style="background:#f472b6" data-color="#f472b6"></div>
      <div class="colorBox" style="background:#fb923c" data-color="#fb923c"></div>
      <div class="colorBox" style="background:#facc15" data-color="#facc15"></div>
      <div class="colorBox" style="background:#e879f9" data-color="#e879f9"></div>
    </div>
  </div>

  <button onclick="startGame()">▶  Starta spelet</button>

  <div style="font-size:13px;opacity:.5;margin-top:4px;">
    Mus/touch: flytta paddel · W/S: höger paddel · ↑/↓: höger paddel
  </div>
</div>

<!-- ── Win overlay ── -->
<div id="winOverlay">
  <div id="winMsg"></div>
  <div id="winSub"></div>
  <button id="winBtn" onclick="goMenu()">🏠 Tillbaka till menyn</button>
</div>

<canvas id="gameCanvas"></canvas>

let lastTime=0;

/* ───────── COLOR PICKER ───────── */
document.getElementById("colorRow").addEventListener("click", e => {
  const box = e.target.closest(".colorBox");
  if(!box) return;
  document.querySelectorAll(".colorBox").forEach(b => b.classList.remove("selected"));
  box.classList.add("selected");
  themeColor = box.dataset.color;
});

/* ───────── START ───────── */
function startGame(){
  player1Name = document.getElementById("p1name").value.trim() || "Spelare 1";
  player2Name = document.getElementById("p2name").value.trim() || "Spelare 2";
  winScore    = parseInt(document.getElementById("winScore").value);

  const diff = document.getElementById("difficulty").value;
  if(diff==="easy"){
    paddleHeight = canvas.height*0.25;
    ballSpeed    = 4;
  } else if(diff==="medium"){
    paddleHeight = canvas.height*0.18;
    ballSpeed    = 6;
  } else {
    paddleHeight = canvas.height*0.12;
    ballSpeed    = 9;
  }

  paddleWidth  = Math.max(12, canvas.width*0.012);
  ballRadius   = Math.max(8, canvas.width*0.009);

  paddle1Y = canvas.height/2 - paddleHeight/2;
  paddle2Y = canvas.height/2 - paddleHeight/2;
  score1 = 0; score2 = 0;

  document.getElementById("startScreen").style.display="none";
  document.getElementById("winOverlay").classList.remove("show");

  gameRunning = true;
  resetBall();
  requestAnimationFrame(gameLoop);
}

function goMenu(){
  gameRunning = false;
  document.getElementById("winOverlay").classList.remove("show");
  document.getElementById("startScreen").style.display="flex";
}

/* ───────── BALL ───────── */
function resetBall(){
  ballX = canvas.width/2;
  ballY = canvas.height/2;
  const angle = (Math.random()*0.6 - 0.3);   // ±17° from horizontal
  const dir   = Math.random()>0.5 ? 1 : -1;
  ballDX = dir * ballSpeed * Math.cos(angle);
  ballDY = ballSpeed * Math.sin(angle);
}

/* ───────── CLAMP ───────── */
function clampPaddles(){
  paddle1Y = Math.max(0, Math.min(canvas.height-paddleHeight, paddle1Y));
  paddle2Y = Math.max(0, Math.min(canvas.height-paddleHeight, paddle2Y));
}

/* ───────── UPDATE ───────── */
function update(){
  ballX += ballDX;
  ballY += ballDY;

  // Top/bottom wall
  if(ballY - ballRadius < 0){
    ballY  = ballRadius;
    ballDY = Math.abs(ballDY);
  }
  if(ballY + ballRadius > canvas.height){
    ballY  = canvas.height - ballRadius;
    ballDY = -Math.abs(ballDY);
  }

  // Paddle 1 (left)
  if(ballDX < 0 &&
     ballX - ballRadius < paddleWidth &&
     ballY > paddle1Y && ballY < paddle1Y + paddleHeight){
    ballX  = paddleWidth + ballRadius;
    ballDX = Math.abs(ballDX);
    // Add spin based on where ball hits paddle
    const rel   = (ballY - (paddle1Y + paddleHeight/2)) / (paddleHeight/2);
    ballDY = rel * ballSpeed * 1.4;
    playSound(pingSound);
  }

  // Paddle 2 (right)
  if(ballDX > 0 &&
     ballX + ballRadius > canvas.width - paddleWidth &&
     ballY > paddle2Y && ballY < paddle2Y + paddleHeight){
    ballX  = canvas.width - paddleWidth - ballRadius;
    ballDX = -Math.abs(ballDX);
    const rel   = (ballY - (paddle2Y + paddleHeight/2)) / (paddleHeight/2);
    ballDY = rel * ballSpeed * 1.4;
    playSound(pingSound);
  }

  // Scoring
  if(ballX < 0){
    score2++;
    playSound(missSound);
    if(checkWin()) return;
    resetBall();
  }
  if(ballX > canvas.width){
    score1++;
    playSound(missSound);
    if(checkWin()) return;
    resetBall();
  }

  clampPaddles();
}

function checkWin(){
  if(score1 >= winScore || score2 >= winScore){
    gameRunning = false;
    playSound(gameOverSound);
    const winner = score1>=winScore ? player1Name : player2Name;
    const s1=score1, s2=score2;
    document.getElementById("winMsg").textContent = "🏆 " + winner + " vinner!";
    document.getElementById("winMsg").style.color = themeColor;
    document.getElementById("winSub").textContent =
      player1Name+" "+s1+" – "+s2+" "+player2Name;
    document.getElementById("winOverlay").classList.add("show");
    return true;
  }
  return false;
}

/* ───────── DRAW ───────── */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Center dashed line
  ctx.setLineDash([12,10]);
  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 0);
  ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles with rounded ends
  drawPaddle(0, paddle1Y, paddleWidth, paddleHeight);
  drawPaddle(canvas.width - paddleWidth, paddle2Y, paddleWidth, paddleHeight);

  // Ball glow
  ctx.shadowColor = themeColor;
  ctx.shadowBlur  = 18;
  ctx.fillStyle   = themeColor;
  ctx.beginPath();
  ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Scores
  ctx.fillStyle = "white";
  ctx.font      = "bold "+Math.floor(canvas.height*0.07)+"px Arial";
  ctx.textAlign = "center";
  ctx.fillText(score1, canvas.width*0.25, canvas.height*0.1);
  ctx.fillText(score2, canvas.width*0.75, canvas.height*0.1);

  // Names
  ctx.font      = "18px Arial";
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.fillText(player1Name, canvas.width*0.25, canvas.height*0.16);
  ctx.fillText(player2Name, canvas.width*0.75, canvas.height*0.16);

  ctx.textAlign = "left";
}

function drawPaddle(x, y, w, h){
  const r = w/2;
  ctx.fillStyle   = themeColor;
  ctx.shadowColor = themeColor;
  ctx.shadowBlur  = 10;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x+w, y+h, x+w, y+h-r, r);
  ctx.lineTo(x+w, y+r);
  ctx.arcTo(x+w, y, x+r, y, r);
  ctx.closePath();
  // Simple rect fallback
  ctx.fillRect(x, y, w, h);
  ctx.shadowBlur = 0;
}

/* ───────── GAME LOOP ───────── */
function gameLoop(ts){
  if(!gameRunning) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

/* ───────── MOUSE ───────── */
canvas.addEventListener("mousemove", e => {
  if(!gameRunning) return;
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;
  if(x < canvas.width/2) paddle1Y = y - paddleHeight/2;
  else                    paddle2Y = y - paddleHeight/2;
});

/* ───────── TOUCH ───────── */
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if(!gameRunning) return;
  const r = canvas.getBoundingClientRect();
  for(const touch of e.touches){
    const x = touch.clientX - r.left;
    const y = touch.clientY - r.top;
    if(x < canvas.width/2) paddle1Y = y - paddleHeight/2;
    else                    paddle2Y = y - paddleHeight/2;
  }
}, {passive:false});

/* ───────── KEYBOARD ───────── */
const keys = {};
document.addEventListener("keydown", e => { keys[e.key]=true; });
document.addEventListener("keyup",   e => { keys[e.key]=false; });

// Separate loop for keyboard so it doesn't lag
setInterval(() => {
  if(!gameRunning) return;
  const spd = 22;
  if(keys["ArrowUp"]   || keys["w"] || keys["W"]) paddle2Y -= spd;
  if(keys["ArrowDown"] || keys["s"] || keys["S"]) paddle2Y += spd;
  if(keys["ArrowLeft"] || keys["a"] || keys["A"]) paddle1Y -= spd;  // bonus
  if(keys["ArrowRight"]|| keys["d"] || keys["D"]) paddle1Y += spd;
}, 16);
</script>
